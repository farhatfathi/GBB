server {
    listen 80;
    server_name portal.baikberdampak.org;

    # Backend API & Auth
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Frontend React SPA
    location / {
        root /var/www/gbb/client/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Serve MinIO public bucket directly if needed
    # location /storage/ {
    #     proxy_pass http://localhost:9000/gbb-files/;
    # }
}
